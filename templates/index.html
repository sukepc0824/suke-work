{% extends "base.html" %}

{% block content %}
<section>
    <h1>{{ t.work_title }}</h1>
    <p>{{ t.work_desc }}</p>
</section>
{% for project in projects %}
<article>
    <a href="{{ project.url }}">
        <img src="/data/img/{{ project.slug }}.jpg" alt="" width="100%" height="100%">
        <div class="title">
            <h2>{{ project['name-en'] if lang == 'en' else project.name }}</h2>
            <h3>{{ project.date }}</h3>
        </div>
        <p>{{ project['description-en'] if lang == 'en' else project.description }}</p>
    </a>
</article>
{% endfor %}
{% endblock %}
